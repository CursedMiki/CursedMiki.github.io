<!DOCTYPE html>
<html lang="ru">
<head>

<title>СессияПро — Подготовка к сессии</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:#0f1117;color:#e2e8f0;font-family:'Inter',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
.logo{font-family:'Unbounded',sans-serif;font-size:22px;font-weight:900;color:#fff;margin-bottom:32px}
.logo b{color:#34d399}
h1{font-family:'Unbounded',sans-serif;font-size:clamp(28px,6vw,52px);font-weight:900;line-height:1.1;letter-spacing:-1px;margin-bottom:16px}
h1 span{color:#34d399}
p{color:#64748b;font-size:16px;max-width:440px;line-height:1.6;margin-bottom:40px}
.cards{display:flex;gap:14px;margin-bottom:40px;flex-wrap:wrap;justify-content:center}
.card{background:#161b27;border:2px solid #1e2740;border-radius:18px;padding:22px 28px;min-width:160px}
.card .n{font-family:'Unbounded',sans-serif;font-size:28px;font-weight:900;color:#34d399;margin-bottom:4px}
.card:nth-child(2) .n{color:#818cf8}
.card .l{font-size:13px;color:#64748b}
a.start{display:inline-flex;align-items:center;gap:10px;background:#34d399;color:#0a0f1a;font-family:'Inter',sans-serif;font-size:16px;font-weight:700;padding:16px 36px;border-radius:14px;text-decoration:none;transition:.2s;margin-bottom:16px}
a.start:hover{background:#2dd4bf;transform:translateY(-2px);box-shadow:0 12px 40px rgba(52,211,153,.3)}
.sub{font-size:13px;color:#475569}
.sub a{color:#64748b;text-decoration:none}
.sub a:hover{color:#34d399}
</style>
</head>
<body>
<div class="logo">Сессия<b>Про</b></div>
<h1>Готовься к сессии <span>умнее</span></h1>
<p>Официальные банки экзаменационных вопросов по Истории Казахстана и Информатике. Случайные вопросы, перемешанные ответы, разбор ошибок.</p>
<div class="cards">
  <div class="card"><div class="n">177</div><div class="l">📜 История КЗ</div></div>
  <div class="card"><div class="n">108</div><div class="l">💻 Информатика</div></div>
</div>

<div class="sub">сделано для <a href="https://github.com/CursedMiki">@CursedMiki</a></div>
